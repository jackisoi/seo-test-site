    <h1>Image Links Missing ALT</h1>
    <p>These are images wrapped in links but missing alt text — the link has no accessible name:</p>
    <a href="/missing-title.html"><img src="/images/photo1.jpg" width="200" height="150"></a>
    <a href="/missing-h1.html"><img src="/images/photo2.jpg" width="200" height="150"></a>

    <p>When an image is the only content of a link, the alt text serves as the link text.</p>
