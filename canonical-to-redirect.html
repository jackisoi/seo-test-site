<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canonical Points To Redirect</title>
    <meta name="description" content="This page's canonical tag points to a URL that redirects.">
    <link rel="canonical" href="https://nimble-monstera-795cd4.netlify.app/redirect-301">
</head>
<body>
    <h1>Canonical To Redirect</h1>
    <p>This page's canonical tag points to /redirect-301, which is a redirecting URL. Canonical tags should point directly to the final destination URL, not to redirects.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
