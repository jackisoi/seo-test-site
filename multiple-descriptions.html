<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page With Multiple Descriptions</title>
    <meta name="description" content="This is the first meta description on this page.">
    <meta name="description" content="This is the second meta description which should not exist.">
    <link rel="canonical" href="https://seo-test-site.netlify.app/multiple-descriptions.html">
</head>
<body>
    <h1>Multiple Meta Descriptions</h1>
    <p>This page has two meta description tags. Only one should exist per page.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
