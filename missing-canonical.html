<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Missing Canonical Tag</title>
    <meta name="description" content="This page has no canonical link element.">
</head>
<body>
    <h1>Missing Canonical Tag</h1>
    <p>This page has no rel=canonical link element. Without a canonical tag, search engines must guess which version of a URL is the preferred one.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
