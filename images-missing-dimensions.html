<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Images Missing Width and Height</title>
    <meta name="description" content="This page has images without width and height attributes.">
    <link rel="canonical" href="https://nimble-monstera-795cd4.netlify.app/images-missing-dimensions.html">
</head>
<body>
    <h1>Images Without Dimensions</h1>
    <p>These images have no width or height attributes, which causes layout shifts (CLS):</p>
    <img src="/images/photo1.jpg" alt="Photo without dimensions">
    <img src="/images/photo2.jpg" alt="Another photo without dimensions">
    <img src="/images/banner.png" alt="Banner without dimensions">
    <p>Always specify width and height attributes on images to prevent Cumulative Layout Shift.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
