<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canonical Points To 404</title>
    <meta name="description" content="This page's canonical tag points to a URL that returns 404.">
    <link rel="canonical" href="https://nimble-monstera-795cd4.netlify.app/page-does-not-exist.html">
</head>
<body>
    <h1>Canonical To Broken Page</h1>
    <p>This page's canonical tag points to a non-existent page that returns a 404 error. This is a critical issue as it tells search engines to prefer a page that doesn't exist.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
