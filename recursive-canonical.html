<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recursive Canonical Page A</title>
    <meta name="description" content="This page's canonical points to another page that points back here.">
    <link rel="canonical" href="https://nimble-monstera-795cd4.netlify.app/recursive-canonical-2.html">
</head>
<body>
    <h1>Recursive Canonical - Page A</h1>
    <p>This page's canonical tag points to recursive-canonical-2.html, which in turn points its canonical back to this page. This creates a circular reference that confuses search engines.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
