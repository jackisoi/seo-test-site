<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meta Refresh Redirect Page</title>
    <meta name="description" content="This page uses meta refresh to redirect.">
    <meta http-equiv="refresh" content="5;url=https://seo-test-site.netlify.app/redirect-destination.html">
    <link rel="canonical" href="https://seo-test-site.netlify.app/meta-refresh.html">
</head>
<body>
    <h1>Meta Refresh Redirect</h1>
    <p>This page uses a meta refresh tag to redirect after 5 seconds. Meta refresh redirects are discouraged for SEO as they can confuse search engines and provide a poor user experience.</p>
    <p>You will be redirected to the destination page in 5 seconds...</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
