<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meta Tags In Body</title>
</head>
<body>
    <meta name="description" content="This meta description is in the body instead of the head.">
    <meta name="robots" content="index, follow">
    <h1>Meta Tags In Wrong Location</h1>
    <p>This page has meta tags placed in the body section instead of the head section. Search engines may ignore meta tags that are not properly placed in the head element.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
