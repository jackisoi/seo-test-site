<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Images With Excessively Long ALT Text</title>
    <meta name="description" content="This page has images with alt text that is way too long.">
    <link rel="canonical" href="https://nimble-monstera-795cd4.netlify.app/images-long-alt.html">
</head>
<body>
    <h1>Images With Very Long ALT Text</h1>
    <img src="/images/photo1.jpg" width="300" height="200" alt="This is an extremely long alt text that goes way beyond the recommended length of 150 characters. It contains a verbose description of the image that no screen reader user would want to listen to in its entirety. The image shows a beautiful sunset over the ocean with waves crashing on the shore and seagulls flying overhead while a family enjoys a picnic on the beach during their summer vacation.">
    <img src="/images/photo2.jpg" width="400" height="300" alt="Another excessively long alt text that describes every minute detail of this photograph including the colors the lighting the composition the mood the feeling and everything else that could possibly be mentioned about a simple stock photo of a person sitting at a desk working on their laptop computer in a modern office space.">
    <p>Alt text should be concise and descriptive, ideally under 150 characters.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
