<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page With Underscores In URL</title>
    <meta name="description" content="This page URL uses underscores instead of hyphens.">
    <link rel="canonical" href="https://seo-test-site.netlify.app/url_with_underscores.html">
</head>
<body>
    <h1>Underscores in URL</h1>
    <p>This page's URL uses underscores instead of hyphens. Google treats hyphens as word separators but underscores are not treated the same way.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
