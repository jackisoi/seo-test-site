<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page With Long Description</title>
    <meta name="description" content="This is an extremely long meta description that goes way beyond the recommended 160 character limit. Search engines will truncate this description in the search results, which means users won't see the full text. It's important to keep meta descriptions concise and within the recommended length to ensure they display properly in search engine results pages and provide clear, compelling summaries of the page content.">
    <link rel="canonical" href="https://seo-test-site.netlify.app/description-too-long.html">
</head>
<body>
    <h1>Long Meta Description</h1>
    <p>This page has a meta description that exceeds 160 characters and will be truncated in search results.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
