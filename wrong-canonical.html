<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page With Wrong Canonical</title>
    <meta name="description" content="This page's canonical points to a completely different page.">
    <link rel="canonical" href="https://seo-test-site.netlify.app/some-other-page.html">
</head>
<body>
    <h1>Wrong Canonical URL</h1>
    <p>This page's canonical tag points to a different URL that isn't this page. This tells search engines to ignore this page in favor of another one.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
