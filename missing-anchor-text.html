<body>
    <h1>Missing Anchor Text</h1>

    <a href="/missing-title.html"></a>
    <a href="/missing-h1.html">   </a>
    <a href="/thin-content.html"><span></span></a>
    <p>Links should always have descriptive anchor text for accessibility and SEO.</p>

    <p><a href="/">Back to homepage</a></p>
</body>
