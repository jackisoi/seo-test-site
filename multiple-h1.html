<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page With Multiple H1 Tags</title>
    <meta name="description" content="This page has two H1 tags which dilutes heading importance.">
    <link rel="canonical" href="https://seo-test-site.netlify.app/multiple-h1.html">
</head>
<body>
    <h1>First H1 Heading On This Page</h1>
    <p>Content between the two H1 tags.</p>
    <h1>Second H1 Heading On This Page</h1>
    <p>Having multiple H1 tags on a single page dilutes the heading hierarchy and confuses search engines about the primary topic.</p>
    <p><a href="/">Back to homepage</a></p>
</body>
</html>
